name: Deploy Services

on:
  push:
    branches:
      - release/*
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG: ${{ github.sha }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_DASHBOARD_REPOSITORY: ${{ vars.ECR_DASHBOARD_REPOSITORY }}
      ECR_DEVICE_MONITORING_REPOSITORY: ${{ vars.ECR_DEVICE_MONITORING_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_DASHBOARD_SERVICE: ${{ vars.ECS_DASHBOARD_SERVICE }}
      ECS_DEVICE_MONITORING_SERVICE: ${{ vars.ECS_DEVICE_MONITORING_SERVICE }}

      # ✅ Test env
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db

    # ✅ Add Postgres service
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # ✅ Wait for DB ready (important)
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            echo "Waiting for postgres..."
            sleep 2
          done

      # ✅ Apply schema
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        # OR faster (recommended for CI tests):
        # run: npx prisma db push

      - name: Run tests
        run: npm test -- --runInBand

      # ======================
      # 🚀 DEPLOY PHASE
      # ======================

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dashboard-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard-service/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DASHBOARD_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DASHBOARD_REPOSITORY }}:latest

      - name: Build and push device-monitoring image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/device-monitoring/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DEVICE_MONITORING_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DEVICE_MONITORING_REPOSITORY }}:latest

      - name: Deploy dashboard-service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_DASHBOARD_SERVICE" \
            --force-new-deployment

      - name: Deploy device-monitoring service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_DEVICE_MONITORING_SERVICE" \
            --force-new-deployment